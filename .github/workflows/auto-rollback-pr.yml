# .github/workflows/auto-rollback-pr.yml
name: Auto Rollback PR (on prod smoke failure)

on:
  workflow_run:
    workflows:
      # IMPORTANT: set this to EXACTLY match your prod smoke workflow "name:" value
      - "Sentinel Rollback (Prod Smoke + Revert PR)"
    types: [completed]
  workflow_dispatch:
    inputs:
      operator_note:
        description: "Optional operator note"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: write
  issues: write

concurrency:
  group: auto-rollback-pr
  cancel-in-progress: false

jobs:
  create-rollback-pr:
    # Guardrail: only act when the watched workflow failed AND it ran on main
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    env:
      DEFAULT_BRANCH: main

      # IMPORTANT: set this to your prod smoke workflow FILE NAME (not the displayed name)
      # Example: ".github/workflows/prod-smoke.yml" => set PROD_SMOKE_WORKFLOW_FILE to "prod-smoke.yml"
      PROD_SMOKE_WORKFLOW_FILE: "sentinel-rollback.yml"

      # Optional: If you want to revert *only* merge commits (recommended)
      REQUIRE_MERGE_COMMIT: "true"

    steps:
      - name: Checkout main (full history)
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEFAULT_BRANCH }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "rollback-bot"
          git config user.email "rollback-bot@users.noreply.github.com"

      - name: Abort if an open rollback PR already exists
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: prs } = await github.rest.pulls.list({
              owner, repo,
              state: "open",
              base: "main",
              per_page: 100,
            });

            const openRollback = prs.filter(pr => (pr.labels || []).some(l => l.name === "rollback"));
            if (openRollback.length > 0) {
              core.setFailed(`Open rollback PR already exists: #${openRollback.map(p => p.number).join(", #")}`);
            } else {
              core.info("No open rollback PRs found. Proceeding.");
            }

      - name: Find latest merge commit on main
        id: find
        run: |
          set -euo pipefail
          git fetch origin "${DEFAULT_BRANCH}:${DEFAULT_BRANCH}" --force

          # Latest merge commit (one step rollback)
          MERGE_SHA="$(git log --merges -n 1 --pretty=format:%H "${DEFAULT_BRANCH}")"
          if [ -z "${MERGE_SHA}" ]; then
            echo "No merge commits found on ${DEFAULT_BRANCH}."
            exit 1
          fi

          # Optional guard: ensure it's actually a merge commit (should be, but we double check)
          PARENTS="$(git show -s --pretty=format:%P "${MERGE_SHA}" | wc -w | tr -d ' ')"
          echo "merge_sha=${MERGE_SHA}" >> $GITHUB_OUTPUT
          echo "parent_count=${PARENTS}" >> $GITHUB_OUTPUT

          echo "Latest merge SHA: ${MERGE_SHA}"
          echo "Parent count: ${PARENTS}"

      - name: Enforce merge commit requirement
        if: env.REQUIRE_MERGE_COMMIT == 'true'
        run: |
          set -euo pipefail
          PC="${{ steps.find.outputs.parent_count }}"
          if [ "${PC}" -lt 2 ]; then
            echo "Latest selected commit is not a merge commit (parent_count=${PC}). Refusing to auto-rollback."
            exit 1
          fi

      - name: War Room event — smoke_failed
        if: always()
        run: |
          curl -sS -X POST "${{ secrets.OPS_EVENTS_INGEST_URL }}" \
            -H "content-type: application/json" \
            -H "x-ops-token: ${{ secrets.OPS_EVENTS_TOKEN }}" \
            -d '{
              "source": "smoke",
              "event_type": "smoke_failed",
              "level": "error",
              "summary": "Prod smoke failed on main — auto rollback initiating",
              "link": "${{ github.event.workflow_run.html_url }}",
              "payload": {
                "triggering_run_id": "${{ github.event.workflow_run.id }}",
                "triggering_head_sha": "${{ github.event.workflow_run.head_sha }}"
              }
            }' || true

      - name: Create rollback branch + revert latest merge
        id: revert
        run: |
          set -euo pipefail

          RUN_ID="${{ github.event.workflow_run.id }}"
          SHORT="$(echo "${{ steps.find.outputs.merge_sha }}" | cut -c1-8)"

          BRANCH="rollback/auto-${RUN_ID}-${SHORT}"
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT

          git checkout -b "${BRANCH}"

          # Revert the merge commit. -m 1 picks mainline parent.
          git revert -m 1 "${{ steps.find.outputs.merge_sha }}" --no-edit

          git push origin "${BRANCH}"

          echo "Created rollback branch: ${BRANCH}"

      - name: Open rollback PR (label: rollback) with required metadata
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const branch = "${{ steps.revert.outputs.branch }}";
            const mergeSha = "${{ steps.find.outputs.merge_sha }}";
            const smokeRun = context.payload.workflow_run;

            const title = `ROLLBACK: revert ${mergeSha.slice(0,8)} (auto)`;
            const body =
`## Auto Rollback PR

This PR was auto-generated because **Prod Smoke failed on \`main\`**.

- **ROLLBACK_OF_SHA:** ${mergeSha}
- **Triggering smoke run:** ${smokeRun.html_url}
- **Head SHA tested (failing):** ${smokeRun.head_sha}
- **Created by:** workflow_run id ${smokeRun.id}

### How this will merge

1) Prod smoke is dispatched against this rollback branch

2) If smoke passes, it applies \`canary-green\`

3) Rollback auto-merge workflow merges this PR (guardrailed)

> If you need to stop this, remove the \`canary-green\` label (or close the PR).
`;

            // Create PR
            const { data: pr } = await github.rest.pulls.create({
              owner,
              repo,
              title,
              head: branch,
              base: "main",
              body
            });

            // Apply rollback label immediately
            await github.rest.issues.addLabels({
              owner, repo,
              issue_number: pr.number,
              labels: ["rollback"]
            });

            core.setOutput("pr_number", String(pr.number));
            core.setOutput("pr_url", pr.html_url);

      - name: War Room event — rollback_pr_created
        if: success()
        run: |
          curl -sS -X POST "${{ secrets.OPS_EVENTS_INGEST_URL }}" \
            -H "content-type: application/json" \
            -H "x-ops-token: ${{ secrets.OPS_EVENTS_TOKEN }}" \
            -d '{
              "source": "rollback",
              "event_type": "rollback_pr_created",
              "level": "warn",
              "summary": "Rollback PR created",
              "link": "${{ steps.pr.outputs.pr_url }}",
              "payload": {
                "branch": "${{ steps.revert.outputs.branch }}",
                "reverted_merge_sha": "${{ steps.find.outputs.merge_sha }}",
                "pr_number": "${{ steps.pr.outputs.pr_number }}"
              }
            }' || true

      - name: Dispatch prod smoke against rollback branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const workflowFile = process.env.PROD_SMOKE_WORKFLOW_FILE; // e.g. "sentinel-rollback.yml"
            const branch = "${{ steps.revert.outputs.branch }}";

            // We assume your prod smoke workflow supports workflow_dispatch with input: rollback_head_ref
            // (We patch that in Step 2 below.)
            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: workflowFile,
              ref: "main",
              inputs: {
                rollback_head_ref: branch
              }
            });

            core.info(`Dispatched ${workflowFile} for rollback branch: ${branch}`);

      - name: War Room event — smoke_dispatched_for_rollback
        if: success()
        run: |
          curl -sS -X POST "${{ secrets.OPS_EVENTS_INGEST_URL }}" \
            -H "content-type: application/json" \
            -H "x-ops-token: ${{ secrets.OPS_EVENTS_TOKEN }}" \
            -d '{
              "source": "smoke",
              "event_type": "smoke_dispatched_for_rollback",
              "level": "info",
              "summary": "Prod smoke dispatched against rollback branch",
              "link": "${{ github.server_url }}/${{ github.repository }}/actions",
              "payload": {
                "branch": "${{ steps.revert.outputs.branch }}",
                "workflow_file": "${{ env.PROD_SMOKE_WORKFLOW_FILE }}"
              }
            }' || true

      - name: Summary
        run: |
          echo "## 🧯 Auto Rollback PR created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- PR: ${{ steps.pr.outputs.pr_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Rollback branch: ${{ steps.revert.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "- Reverted merge: ${{ steps.find.outputs.merge_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Triggering smoke run: ${{ github.event.workflow_run.html_url }}" >> $GITHUB_STEP_SUMMARY

