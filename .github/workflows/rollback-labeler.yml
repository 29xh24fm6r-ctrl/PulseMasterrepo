# .github/workflows/rollback-labeler.yml
name: Rollback PR Labeler

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
    branches: [main]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  label-rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Apply rollback label when branch/title indicates rollback
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const head = (pr.head?.ref || "").toLowerCase();
            const title = (pr.title || "").toLowerCase();

            const isRollbackBranch =
              head.startsWith("rollback/") ||
              head.startsWith("revert/") ||
              head.startsWith("hotfix/rollback/");

            const isRollbackTitle =
              title.startsWith("rollback:") ||
              title.includes("[rollback]") ||
              title.includes("rollback ");

            if (!isRollbackBranch && !isRollbackTitle) {
              core.info("Not a rollback-shaped PR. No label applied.");
              return;
            }

            const labels = (pr.labels || []).map(l => l.name);
            if (labels.includes("rollback")) {
              core.info("rollback label already present.");
              return;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pr.number,
              labels: ["rollback"]
            });

            core.info(`Applied rollback label to PR #${pr.number}`);

