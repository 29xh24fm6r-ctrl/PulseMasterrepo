name: Simulation Sentinel

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC (01:00 ET)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: simulation-sentinel
  cancel-in-progress: false

jobs:
  sentinel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Run Simulation Sentinel
        env:
          # Required: app env
          NODE_ENV: "production"

          # Supabase (service role for server-side admin operations)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          # If your AGI kernel needs it:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

          # Optional: allow patch deletes (default false)
          SENTINEL_ALLOW_DELETE: "false"

          # Optional: branch prefix
          SENTINEL_BRANCH_PREFIX: "sentinel/fix"

          # Optional: gate command
          SENTINEL_GATE: "npm run build"

          # Git identity for commits
          GIT_AUTHOR_NAME: "Simulation Sentinel"
          GIT_AUTHOR_EMAIL: "sentinel@users.noreply.github.com"
          GIT_COMMITTER_NAME: "Simulation Sentinel"
          GIT_COMMITTER_EMAIL: "sentinel@users.noreply.github.com"

          # GitHub token is provided automatically
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        run: node scripts/sentinel/nightly.mjs

