name: Deploy Staging

on:
  push:
    branches: ["develop", "staging"]
  workflow_dispatch: {}

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy (staging)
    runs-on: ubuntu-latest
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Guard + Typecheck + Lint
        run: |
          npm run guard:no-internal-http
          npm run typecheck
          npm run lint || echo "Lint warnings allowed"

      # Vercel Deploy Hook
      - name: Trigger Staging Deploy (Deploy Hook)
        if: ${{ secrets.STAGING_DEPLOY_HOOK_URL != '' }}
        run: |
          echo "🚀 Triggering staging deployment via Vercel deploy hook..."
          curl -fsS -X POST "${{ secrets.STAGING_DEPLOY_HOOK_URL }}"
          echo "✅ Deploy hook triggered successfully"

      # Fallback: Vercel CLI
      - name: Deploy to Vercel (CLI)
        if: ${{ secrets.STAGING_DEPLOY_HOOK_URL == '' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "🚀 Deploying to Vercel via CLI..."
          npx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          npx vercel build --token="$VERCEL_TOKEN"
          npx vercel deploy --prebuilt --token="$VERCEL_TOKEN"
          echo "✅ Deployment completed"

